name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      package-set:
        description: "Package batch to publish"
        required: true
        default: all
        type: choice
        options:
          - group1
          - group2
          - group3
          - all

permissions:
  contents: read

jobs:
  guard-pypi-branch:
    name: Guard PyPI branch
    runs-on: ubuntu-22.04

    steps:
      - name: Require main branch
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" != "main" ]; then
            echo "PyPI publishing must run from main, not '${GITHUB_REF_NAME}'."
            exit 1
          fi

  build:
    name: Build PyPI distributions
    needs: guard-pypi-branch
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: |
          set -euo pipefail
          mkdir -p dist/mojogp
          python -m build --outdir dist/mojogp
          for target in sm75 sm80 sm86 sm89 sm90 sm100 sm120; do
            package="mojogp-cuda-${target}"
            mkdir -p "dist/${package}"
            python -m build --outdir "dist/${package}" "accelerator_packages/${target}"
          done

      - name: Check distributions
        run: python -m twine check dist/*/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: mojogp-0.26.6.0-dist
          path: dist/
          if-no-files-found: error

  publish-mojogp:
    name: Publish mojogp to PyPI
    needs: build
    if: ${{ github.event.inputs.package-set == 'group1' || github.event.inputs.package-set == 'all' }}
    runs-on: ubuntu-22.04
    environment: pypi-mojogp
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: mojogp-0.26.6.0-dist
          path: dist

      - name: Publish mojogp to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp/

  publish-sm75:
    name: Publish mojogp-cuda-sm75 to PyPI
    needs: build
    if: ${{ github.event.inputs.package-set == 'group1' || github.event.inputs.package-set == 'all' }}
    runs-on: ubuntu-22.04
    environment: pypi-cuda-sm75
    permissions:
      contents: read
