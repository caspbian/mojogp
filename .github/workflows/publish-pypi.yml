name: Publish to PyPI

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-publish:
    name: Build and publish PyPI packages
    runs-on: ubuntu-22.04
    environment: pypi

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packaging tools
        run: python -m pip install --upgrade pip build twine

      - name: Build distributions
        run: |
          set -euo pipefail
          mkdir -p dist/mojogp
          python -m build --outdir dist/mojogp
          for target in sm75 sm80 sm86 sm89 sm90 sm100 sm120; do
            package="mojogp-cuda-${target}"
            mkdir -p "dist/${package}"
            python -m build --outdir "dist/${package}" "accelerator_packages/${target}"
          done

      - name: Check distributions
        run: python -m twine check dist/*/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: mojogp-0.26.6.0-dist
          path: dist/**/*
          if-no-files-found: error

      - name: Publish mojogp to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp/

      - name: Publish mojogp-cuda-sm75 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm75/

      - name: Publish mojogp-cuda-sm80 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm80/

      - name: Publish mojogp-cuda-sm86 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm86/

      - name: Publish mojogp-cuda-sm89 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm89/

      - name: Publish mojogp-cuda-sm90 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm90/

      - name: Publish mojogp-cuda-sm100 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm100/

      - name: Publish mojogp-cuda-sm120 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/mojogp-cuda-sm120/
