[pytest]
# Pytest configuration for KeOps-Mojo tests

# Test discovery
testpaths =
    tests/unit
    tests/integration
    tests/system
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# No timeout for large-scale tests
# (removed pytest-timeout plugin to allow unlimited runtime)

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    gpu: marks tests that require GPU
    large_scale: marks tests with large memory/compute requirements
    comparison: marks tests that compare implementations
    # Coverage tiers
    minimal: minimal coverage tests (2-3 configs, ~30s)
    moderate: moderate coverage tests (5-8 configs, ~2min)
    full: full coverage tests (all configs, ~10min)
    # Feature markers
    single_output: single-output GP tests
    multi_output: multi-output GP tests
    ard: ARD (Automatic Relevance Determination) tests
    composite: composite kernel tests
    prediction: prediction accuracy tests
    speed: speed-focused benchmarks or validations
    memory: memory-focused benchmarks or validations
    accuracy: predictive accuracy validations
    gpytorch: tests comparing against GPyTorch
    reference: oracle-backed correctness tests
    matrix_free: matrix-free GP tests
    ground_truth: ground truth comparison tests
    system: system tests
    integration: integration tests (train GPs, require convergence)
    benchmark: explicit benchmark or certification surface
    certification: explicit release certification surface
